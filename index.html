<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>품사 마스터: 최종 협동 버전</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setup-container" class="main-container">
        <h1>👥 모둠 협동 품사 마스터</h1>
        <hr>
        <div class="setup-group">
            <label><strong>🏠 모둠 선택:</strong></label>
            <select id="team-select">
                </select>
        </div>
        <div class="setup-group">
            <label><strong>📌 인원 선택:</strong></label>
            <select id="member-count">
                <option value="2">2명</option>
                <option value="3">3명</option>
                <option value="4" selected>4명</option>
                <option value="5">5명</option>
                <option value="6">6명</option>
            </select>
        </div>
        <div id="name-inputs-area"></div>
        <button id="start-quiz-btn" class="btn-main">학습 시작하기 🚀</button>
    </div>

    <div id="quiz-container" class="main-container hidden">
        <div class="top-nav">
            <button id="prev-btn" class="btn-nav">⬅️ 이전</button>
            <div id="team-display-tag" class="team-tag"></div>
            <div class="attempt-info">도전: <span id="attempt-count">1</span>/4</div>
        </div>
        
        <div class="score-board">
            <span>맞힌 문제: <strong id="score">0</strong></span>
            <span>진행: <strong id="question-count">1</strong>/9</span>
        </div>

        <div class="question-box">
            <div id="word-display">단어</div>
        </div>

        <div id="strong-hint-box" class="strong-hint-box hidden"></div>

        <div class="member-status-box" id="member-badges-container"></div>

        <div id="anonymous-result-box" class="anonymous-result-box hidden">
            <h4>📊 우리 모둠의 선택 현황</h4>
            <div id="result-stat-display"></div>
            <p class="guide-text">답변을 확인하고 아래 버튼을 누르세요.</p>
            <button id="go-to-remedial-btn" class="btn-main hidden">문법 근거 입력하기 📝</button>
            <button id="go-to-next-direct-btn" class="btn-main hidden">정답입니다! 다음으로 ➡️</button>
        </div>

        <div class="options-grid" id="options-container">
            <button class="btn-option" data-pos="명사">명사</button>
            <button class="btn-option" data-pos="대명사">대명사</button>
            <button class="btn-option" data-pos="수사">수사</button>
            <button class="btn-option" data-pos="조사">조사</button>
            <button class="btn-option" data-pos="동사">동사</button>
            <button class="btn-option" data-pos="형용사">형용사</button>
            <button class="btn-option" data-pos="관형사">관형사</button>
            <button class="btn-option" data-pos="부사">부사</button>
            <button class="btn-option" data-pos="감탄사">감탄사</button>
        </div>

        <div id="remedial-box" class="remedial-box hidden">
            <h3>🧐 문법 근거 보완 학습</h3>
            <div class="criteria-step"><strong>1. 형태:</strong> <select class="reason-select" id="sel-form"></select></div>
            <div class="criteria-step"><strong>2. 기능:</strong> <select class="reason-select" id="sel-func"></select></div>
            <div class="criteria-step"><strong>3. 의미:</strong> <select class="reason-select" id="sel-mean"></select></div>
            <button id="retry-quiz-btn" class="btn-retry">근거 확인 완료! 다시 풀기</button>
        </div>
    </div>

    <div id="result-container" class="main-container hidden">
        <h1>🏆 최종 결과 리포트</h1>
        <hr>
        <div id="rank-section">
            <h3>📊 순위 확인</h3>
            <div class="rank-box">
                <p><strong>우리 모둠 순위:</strong> <span id="team-rank">-</span>위</p>
                <p><strong>개인별 정답 기여도:</strong></p>
                <div id="personal-stats"></div>
            </div>
        </div>
        <hr>
        <div id="review-section">
            <h3>🔍 문제 다시보기</h3>
            <div id="review-list"></div>
        </div>
        <button onclick="location.reload()" class="btn-main">다시 시작하기 🔄</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
